name: E2E Tests

on:
  push:
  pull_request:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: geo_task_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -padmin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Start Keycloak via Docker Compose
        run: |
          docker compose up -d keycloak
          docker ps
          docker compose logs keycloak
        
      - name: Wait for Keycloak
        run: |
          echo "Waiting for Keycloak to start..."
          timeout 180 bash -c 'until nc -z 127.0.0.1 8080; do echo "Waiting for Keycloak..."; sleep 5; done'
          echo "Keycloak is up!"

      - name: Check Keycloak logs
        if: failure()
        run: docker compose logs keycloak

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci || npm install

      - name: Setup Database (Prisma)
        working-directory: ./backend
        run: |
          npx prisma db push
          # Wait for DB push to be available
          sleep 2
          # If there is a seed script, it will execute here
          npx prisma db seed || echo "Seed skipped or failed"
        env:
          DATABASE_URL: mysql://root:admin@127.0.0.1:3306/geo_task_db?allowPublicKeyRetrieval=true
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: admin
          MYSQL_DATABASE: geo_task_db
          KEYCLOAK_URL: http://127.0.0.1:8080
          KEYCLOAK_REALM: geo-task-realm

      - name: Start Backend Service
        working-directory: ./backend
        run: npm run dev &
        env:
          DATABASE_URL: mysql://root:admin@127.0.0.1:3306/geo_task_db?allowPublicKeyRetrieval=true
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: admin
          MYSQL_DATABASE: geo_task_db
          KEYCLOAK_URL: http://127.0.0.1:8080
          KEYCLOAK_REALM: geo-task-realm

      - name: Wait for Backend
        run: |
          timeout 60 bash -c 'until nc -z 127.0.0.1 3000; do echo "Waiting for Backend..."; sleep 5; done'
          echo "Backend is up!"

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: ./frontend
        run: npx playwright test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
