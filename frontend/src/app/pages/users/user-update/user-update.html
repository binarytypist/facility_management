<div class="min-h-screen bg-slate-900 text-slate-100 p-8">
  @if (loading()) {
    <div class="flex flex-col items-center justify-center mt-32">
      <svg
        class="animate-spin h-8 w-8 text-indigo-500 mb-4"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
      >
        <circle
          class="opacity-25"
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="4"
        ></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
      <p class="text-slate-400">Loading user details...</p>
    </div>
  }

  @if (!loading()) {
    <div class="max-w-5xl mx-auto">
      <div class="flex items-center space-x-4 mb-8">
        <button
          (click)="cancel()"
          class="p-2 hover:bg-slate-800 text-slate-400 hover:text-white rounded-lg transition-colors"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10 19l-7-7m0 0l7-7m-7 7h18"
            ></path>
          </svg>
        </button>
        <div>
          <h2
            class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-blue-400"
          >
            Update User Profile
          </h2>
          <p class="text-base text-slate-400 mt-1">
            Update the employee's personal and job details.
          </p>
        </div>
      </div>
      <div class="bg-slate-950 border border-slate-800 rounded-2xl p-8 shadow-2xl">
        <h3
          class="text-xl font-semibold text-slate-200 mb-8 flex items-center space-x-3 border-b border-slate-800/80 pb-4"
        >
          <svg
            class="w-6 h-6 text-indigo-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
            ></path>
          </svg>
          <span>Profile Information</span>
        </h3>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2"
              >User / Employee Number *</label
            >
            <input
              type="text"
              [(ngModel)]="user_number"
              class="w-full px-4 py-3 text-base bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
              placeholder="e.g. EMP-1004"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2">First Name *</label>
            <input
              type="text"
              [(ngModel)]="first_name"
              class="w-full px-4 py-3 text-base bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 transition-colors"
              placeholder="First Name"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2">Middle Name</label>
            <input
              type="text"
              [(ngModel)]="middle_name"
              class="w-full px-4 py-3 text-base bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 transition-colors"
              placeholder="Middle Name (Optional)"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2">Last Name *</label>
            <input
              type="text"
              [(ngModel)]="last_name"
              class="w-full px-4 py-3 text-base bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 transition-colors"
              placeholder="Last Name"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2">Designation *</label>
            <select
              [(ngModel)]="designation"
              class="w-full px-4 py-3 text-base bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 transition-colors text-slate-200"
            >
              <option value="">Select a designation...</option>
              @for (desig of designations(); track desig) {
                <option [value]="desig.name">{{ desig.code }} - {{ desig.name }}</option>
              }
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2">Job Type *</label>
            <select
              [(ngModel)]="job_type"
              class="w-full px-4 py-3 text-base bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 transition-colors text-slate-200"
            >
              <option value="">Select employment type...</option>
              <option value="permanent">Permanent</option>
              <option value="temporary">Temporary</option>
              <option value="contract">Contract</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2">System Role</label>
            <select
              [(ngModel)]="role_id"
              class="w-full px-4 py-3 text-base bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 transition-colors text-slate-200"
            >
              <option [ngValue]="null">Select a role (defaults to User)</option>
              @for (role of roles(); track role) {
                <option [ngValue]="role.id">{{ role.name }}</option>
              }
            </select>
          </div>
          <div class="flex items-center space-x-4 mt-6">
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" [(ngModel)]="is_active" class="sr-only peer" />
              <div
                class="w-12 h-6 bg-slate-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"
              ></div>
              <span class="ml-4 text-sm font-semibold text-slate-300">Account Active</span>
            </label>
          </div>
        </div>
        @if (errorMessage()) {
          <div class="mt-8 p-4 bg-red-900/30 border border-red-800 rounded-xl">
            <p class="text-sm text-red-400 font-medium">{{ errorMessage() }}</p>
          </div>
        }
        <div class="mt-8 flex items-center justify-end border-t border-slate-800/80 pt-8">
          <button
            (click)="save()"
            [disabled]="saving() || !isFormValid"
            class="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed text-white text-base font-bold rounded-xl shadow-lg shadow-indigo-500/20 transition-all flex items-center space-x-3"
          >
            @if (saving()) {
              <svg
                class="animate-spin -ml-1 h-5 w-5 text-white"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
              >
                <circle
                  class="opacity-25"
                  cx="12"
                  cy="12"
                  r="10"
                  stroke="currentColor"
                  stroke-width="4"
                ></circle>
                <path
                  class="opacity-75"
                  fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                ></path>
              </svg>
            }
            @if (!saving()) {
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M5 13l4 4L19 7"
                ></path>
              </svg>
            }
            <span>Update User Profile</span>
          </button>
        </div>
      </div>
    </div>
  }
</div>
