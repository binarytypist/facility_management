<div class="min-h-screen bg-slate-900 text-slate-100 p-8">
  <div class="max-w-3xl mx-auto">
    <div class="flex items-center space-x-4 mb-8">
      <button
        (click)="cancel()"
        class="p-2 hover:bg-slate-800 text-slate-400 hover:text-white rounded-lg transition-colors"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M10 19l-7-7m0 0l7-7m-7 7h18"
          ></path>
        </svg>
      </button>
      <div>
        <h2
          class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-emerald-400"
        >
          Manage Credentials
        </h2>
        <p class="text-base text-slate-400 mt-1">Assign or update login access for an employee.</p>
      </div>
    </div>

    <div class="bg-slate-950 border border-slate-800 rounded-2xl p-8 shadow-2xl">
      <div class="mb-8">
        <label class="block text-sm font-medium text-slate-300 mb-3">Select Employee *</label>
        <select
          (change)="onUserSelect($event)"
          class="w-full px-4 py-4 text-base bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 transition-colors text-slate-200"
        >
          <option value="">-- Choose an employee --</option>
          @for (user of users(); track user) {
            <option [value]="user.id">
              {{ user.user_number || 'ID: ' + user.id }} - {{ user.first_name }}
              {{ user.last_name }}
              {{ user.email ? '(Has Access)' : '(No Access)' }}
            </option>
          }
        </select>
      </div>

      @if (selectedUserId) {
        <div class="space-y-6 border-t border-slate-800/80 pt-8 animate-fade-in">
          <h3 class="text-lg font-semibold text-slate-200 flex items-center space-x-2">
            <svg
              class="w-5 h-5 text-indigo-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
              ></path>
            </svg>
            <span>Login Details</span>
          </h3>
          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2">Email Address *</label>
            <input
              type="email"
              [(ngModel)]="email"
              class="w-full px-4 py-3 text-base bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 transition-colors"
              placeholder="employee@example.com"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2"
              >Password
              <span class="text-xs text-slate-500 font-normal ml-2"
                >(Leave blank to keep existing password)</span
              ></label
            >
            <input
              type="password"
              [(ngModel)]="password"
              class="w-full px-4 py-3 text-base bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 transition-colors"
              placeholder="••••••••"
            />
          </div>
          @if (password) {
            <div>
              <label class="block text-sm font-medium text-slate-400 mb-2">Retype Password *</label>
              <input
                type="password"
                [(ngModel)]="retype_password"
                class="w-full px-4 py-3 text-base bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 transition-colors"
                placeholder="••••••••"
              />
              @if (retype_password && password !== retype_password) {
                <p class="text-sm text-red-400 mt-2 flex items-center">
                  <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                    ></path>
                  </svg>
                  Passwords do not match
                </p>
              }
            </div>
          }
          <div class="mt-10 flex items-center justify-end border-t border-slate-800/80 pt-8">
            <button
              (click)="save()"
              [disabled]="saving() || !isFormValid"
              class="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed text-white text-base font-bold rounded-xl shadow-lg shadow-indigo-500/20 transition-all flex items-center space-x-3"
            >
              @if (saving()) {
                <svg
                  class="animate-spin -ml-1 h-5 w-5 text-white"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                >
                  <circle
                    class="opacity-25"
                    cx="12"
                    cy="12"
                    r="10"
                    stroke="currentColor"
                    stroke-width="4"
                  ></circle>
                  <path
                    class="opacity-75"
                    fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                  ></path>
                </svg>
              }
              @if (!saving()) {
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
                  ></path>
                </svg>
              }
              <span>Assign Credentials</span>
            </button>
          </div>
        </div>
      }
    </div>
  </div>
</div>
