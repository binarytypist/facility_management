<div class="min-h-screen bg-slate-900 text-slate-100 p-8">
  <div class="max-w-7xl mx-auto">
    <div class="mb-8">
      <button
        routerLink="/clients/list"
        class="text-indigo-400 hover:text-indigo-300 font-medium text-sm flex items-center space-x-2 mb-4 transition-colors"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M10 19l-7-7m0 0l7-7m-7 7h18"
          ></path>
        </svg>
        <span>Back to Clients</span>
      </button>
      <h1
        class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-blue-400"
      >
        Register New Client Company
      </h1>
      <p class="text-slate-400 mt-2">
        First, create the company. You can add employees/contacts on the next step.
      </p>
    </div>

    <!-- Tabs Header (Disabled Employee Tab for Creation) -->
    <div class="flex border-b border-slate-800 mb-6 space-x-8">
      <button
        class="pb-4 text-indigo-400 border-b-2 border-indigo-400 font-medium transition-colors"
      >
        Company Details
      </button>
      <button
        class="pb-4 text-slate-600 cursor-not-allowed font-medium"
        title="Save the company first to add employees"
      >
        Employee Information
      </button>
    </div>

    <div
      class="bg-slate-950 border border-slate-800 rounded-2xl p-8 shadow-xl relative overflow-hidden"
    >
      <div
        class="absolute top-0 right-0 w-64 h-64 bg-indigo-500/5 rounded-bl-full pointer-events-none"
      ></div>

      <div class="relative z-10 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2">Company Name *</label>
            <input
              type="text"
              [(ngModel)]="name"
              class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-slate-200 transition-colors"
              placeholder="e.g. Acme Corporation"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2">Company Code</label>
            <input
              type="text"
              [(ngModel)]="code"
              class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-slate-200 transition-colors"
              placeholder="e.g. ACM-001"
            />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2">Type of Business *</label>
            <select
              [(ngModel)]="company_type_id"
              class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-slate-200 transition-colors"
            >
              <option [ngValue]="null">Select Business Type</option>
              @for (ct of companyTypes(); track ct) {
                <option [value]="ct.id">{{ ct.name }}</option>
              }
            </select>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2">Company Phone</label>
            <input
              type="text"
              [(ngModel)]="phone"
              class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-slate-200 transition-colors"
              placeholder="Office Phone Number"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2">Address</label>
            <input
              type="text"
              [(ngModel)]="address"
              class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-slate-200 transition-colors"
              placeholder="Street address"
            />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2">City</label>
            <input
              type="text"
              [(ngModel)]="city"
              class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-slate-200 transition-colors"
              placeholder="City Name"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2">Postcode</label>
            <input
              type="text"
              [(ngModel)]="postcode"
              maxlength="5"
              [class.border-red-500]="postcode && !isPostcodeValid"
              class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-slate-200 transition-colors"
              placeholder="5 digits (e.g. 12345)"
            />
            @if (postcode && !isPostcodeValid) {
              <p class="text-xs text-red-400 mt-1">Must be exactly 5 digits.</p>
            }
          </div>
        </div>

        <div class="border-t border-slate-800 pt-6 mt-6">
          <h3 class="text-sm font-semibold text-slate-300 mb-4 uppercase tracking-wider">
            Facility Specifics
          </h3>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
              <label class="block text-sm font-medium text-slate-400 mb-2"
                >Number of Employees</label
              >
              <input
                type="number"
                [(ngModel)]="num_employees"
                class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-slate-200 transition-colors"
                placeholder="e.g. 50"
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-400 mb-2">Floor Level</label>
              <input
                type="text"
                [(ngModel)]="floor_level"
                class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-slate-200 transition-colors"
                placeholder="e.g. 5th Floor"
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-400 mb-2"
                >Floor Size (sqm/sqft)</label
              >
              <input
                type="text"
                [(ngModel)]="floor_size"
                class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-slate-200 transition-colors"
                placeholder="e.g. 2500"
              />
            </div>
          </div>

          <div class="mt-6 flex items-center justify-between">
            <div class="flex items-center">
              <label class="flex items-center cursor-pointer">
                <div class="relative">
                  <input type="checkbox" [(ngModel)]="has_elevator" class="sr-only" />
                  <div
                    class="block bg-slate-800 w-10 h-6 rounded-full"
                    [class.bg-indigo-600]="has_elevator"
                  ></div>
                  <div
                    class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition transform"
                    [class.translate-x-4]="has_elevator"
                  ></div>
                </div>
                <div class="ml-3 text-sm font-medium text-slate-300">Elevator Provided</div>
              </label>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2">Other Information</label>
            <textarea
              [(ngModel)]="other_info"
              rows="2"
              class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-slate-200 transition-colors"
              placeholder="Additional facility details..."
            ></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2">Company Status</label>
            <label class="relative inline-flex items-center cursor-pointer mt-2">
              <input type="checkbox" [(ngModel)]="is_active" class="sr-only peer" />
              <div
                class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-500"
              ></div>
              <span
                class="ml-3 text-sm font-medium"
                [ngClass]="is_active ? 'text-indigo-400' : 'text-slate-500'"
                >{{ is_active ? 'Active' : 'Inactive' }}</span
              >
            </label>
            <p class="text-xs text-slate-500 mt-2">
              Inactive companies will not appear in assignment lists.
            </p>
          </div>
        </div>
      </div>

      @if (errorMessage()) {
        <div class="mt-8 p-4 bg-red-900/30 border border-red-800 rounded-xl">
          <p class="text-sm text-red-400 font-medium">{{ errorMessage() }}</p>
        </div>
      }

      <div
        class="mt-8 flex items-center justify-end border-t border-slate-800/80 pt-8 relative z-10"
      >
        <button
          (click)="save()"
          [disabled]="saving() || !isFormValid"
          class="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-semibold rounded-xl shadow-lg shadow-indigo-500/20 transition-all flex items-center"
        >
          @if (saving()) {
            <svg
              class="animate-spin -ml-1 mr-3 h-5 w-5 text-white"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
          }
          Save & Proceed to Employees
        </button>
      </div>
    </div>
  </div>
</div>
